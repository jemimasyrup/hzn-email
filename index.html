<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HorizonTV Staff Portal</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #020617;
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px 20px;
}

header h1 {
    margin: 0;
    font-size: 32px;
    letter-spacing: 1px;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

h2 {
    margin-top: 0;
    font-size: 20px;
    color: #a78bfa;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #7c3aed;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #6d28d9;
}

.footer {
    text-align: center;
    padding: 25px;
    font-size: 13px;
    color: #64748b;
}
</style>
</head>

<body>

<header>
    <h1>HorizonTV Staff Portal</h1>
</header>

<div class="container">

    <div class="card">
        <h2>📥 Email</h2>
        <button onclick="openInbox()">Open Inbox</button>
    </div>

    <div class="card">
        <h2>🛠 Staff Tools</h2>
        <button onclick="openDiscord()">Open Staff Discord</button>
        <button onclick="openRoblox()">Open Roblox Group Panel</button>
    </div>

</div>

<div class="footer">
    HorizonTV Network • Staff Access Only
</div>

<script>
function openInbox() {
    window.open("https://webmail.migadu.com", "_blank");
}

function openDiscord() {
    window.open("https://discord.gg/YOURINVITE", "_blank");
}

function openRoblox() {
    window.open("https://www.roblox.com/groups/YOURGROUPID", "_blank");
}
</script>

</body>
</html>
