<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HorizonTV Staff Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0b0f1a 0%, #020617 60%);
    color: white;
}

/* NAV / HEADER */
header {
    padding: 50px 20px 20px;
    text-align: center;
}

.logo {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(90deg,#7c3aed,#22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    margin-top: 10px;
    color: #94a3b8;
    font-size: 14px;
}

/* MAIN */
.container {
    max-width: 720px;
    margin: auto;
    padding: 20px;
}

/* CARD STYLE */
.card {
    background: rgba(15,23,42,0.7);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

/* HEADINGS */
h2 {
    margin: 0 0 15px 0;
    font-size: 18px;
    font-weight: 600;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(90deg,#7c3aed,#4f46e5);
    color: white;
    font-weight: 600;
    transition: 0.2s;
}

button:hover {
    opacity: 0.85;
    transform: scale(1.01);
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 30px;
    font-size: 13px;
    color: #64748b;
}
</style>
</head>

<body>

<header>
    <div class="logo">HorizonTV</div>
    <div class="subtitle">Staff Portal</div>
</header>

<div class="container">

    <div class="card">
        <h2>📥 Email</h2>
        <button onclick="openInbox()">Open Inbox</button>
    </div>

    <div class="card">
        <h2>🛠 Staff Tools</h2>
        <button onclick="openDiscord()">Open Staff Discord</button>
        <button onclick="openRoblox()">Open Roblox Group Panel</button>
    </div>

</div>

<div class="footer">
    HorizonTV Network • Internal Staff Access
</div>

<script>
function openInbox() {
    window.open("https://webmail.migadu.com", "_blank");
}

function openDiscord() {
    window.open("https://discord.gg/YOURINVITE", "_blank");
}

function openRoblox() {
    window.open("https://www.roblox.com/groups/YOURGROUPID", "_blank");
}
</script>

</body>
</html>
